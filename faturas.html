<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faturas — oGrupo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 max-w-lg mx-auto min-h-screen pb-24">

  <div id="toast" class="hidden"></div>

  <header class="bg-violet-700 text-white px-4 py-4 sticky top-0 z-40 shadow">
    <h1 class="text-xl font-bold">Faturas</h1>
    <!-- Filtros -->
    <div class="flex gap-2 mt-3 overflow-x-auto pb-1">
      <button onclick="setFiltro('vencida')" id="btn-vencida"
        class="filtro-btn whitespace-nowrap px-3 py-1.5 rounded-full text-xs font-medium bg-white/20 text-white">
        ⚠️ Vencidas
      </button>
      <button onclick="setFiltro('pendente')" id="btn-pendente"
        class="filtro-btn whitespace-nowrap px-3 py-1.5 rounded-full text-xs font-medium bg-white/20 text-white">
        🕐 Pendentes
      </button>
      <button onclick="setFiltro('pago')" id="btn-pago"
        class="filtro-btn whitespace-nowrap px-3 py-1.5 rounded-full text-xs font-medium bg-white/20 text-white">
        ✅ Pagas
      </button>
      <button onclick="setFiltro('todas')" id="btn-todas"
        class="filtro-btn whitespace-nowrap px-3 py-1.5 rounded-full text-xs font-medium bg-white/20 text-white">
        📋 Todas
      </button>
    </div>
  </header>

  <main class="p-4 space-y-3">

    <!-- Seletor de mês -->
    <div class="flex items-center gap-2">
      <label class="text-sm text-gray-600 font-medium">Mês:</label>
      <input type="month" id="sel-mes"
        class="border border-gray-200 rounded-xl px-3 py-1.5 text-sm outline-none focus:border-violet-400">
      <button onclick="gerarFaturas()"
        class="ml-auto bg-violet-600 text-white text-xs px-3 py-1.5 rounded-xl font-medium hover:bg-violet-700">
        📅 Gerar
      </button>
    </div>

    <!-- Resumo -->
    <div id="resumo" class="hidden flex gap-3 overflow-x-auto pb-1"></div>

    <!-- Loading -->
    <div id="loading" class="text-center py-12 text-gray-400"><div class="text-4xl mb-2">⏳</div><p>Carregando...</p></div>

    <!-- Lista -->
    <div id="lista-faturas" class="hidden space-y-2"></div>
    <p id="vazio" class="hidden text-center text-gray-400 py-8">Nenhuma fatura encontrada.</p>

  </main>

  <!-- Bottom nav -->
  <nav class="fixed bottom-0 left-0 right-0 max-w-lg mx-auto bg-white border-t border-gray-200 flex justify-around py-2 z-50">
    <a href="index.html" class="flex flex-col items-center text-xs text-gray-500 hover:text-violet-700">
      <span class="text-2xl">🏠</span><span>Início</span>
    </a>
    <a href="alunos.html" class="flex flex-col items-center text-xs text-gray-500 hover:text-violet-700">
      <span class="text-2xl">👥</span><span>Alunos</span>
    </a>
    <a href="turmas.html" class="flex flex-col items-center text-xs text-gray-500 hover:text-violet-700">
      <span class="text-2xl">💃</span><span>Turmas</span>
    </a>
    <a href="faturas.html" class="flex flex-col items-center text-xs text-violet-700 font-medium">
      <span class="text-2xl">📄</span><span>Faturas</span>
    </a>
  </nav>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    let todasFaturas = [];
    let todosAlunos  = [];
    let filtroAtivo  = 'vencida';

    async function init() {
      // Lê filtro da URL
      const params = new URLSearchParams(location.search);
      filtroAtivo = params.get('filtro') || 'vencida';

      // Mês padrão = mês atual
      const mesInput = document.getElementById('sel-mes');
      mesInput.value = Utils.mesAtual();
      mesInput.addEventListener('change', renderLista);

      try {
        [todasFaturas, todosAlunos] = await Promise.all([
          API.getFaturas(), API.getAlunos()
        ]);
        aplicarFiltro(filtroAtivo);
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('lista-faturas').classList.remove('hidden');
      } catch (err) {
        document.getElementById('loading').innerHTML = `<p class="text-red-500">Erro: ${err.message}</p>`;
      }
    }

    function setFiltro(f) {
      filtroAtivo = f;
      aplicarFiltro(f);
    }

    function aplicarFiltro(f) {
      // Highlight botão ativo
      document.querySelectorAll('.filtro-btn').forEach(b => {
        b.classList.remove('bg-white', 'text-violet-700');
        b.classList.add('bg-white/20', 'text-white');
      });
      const btn = document.getElementById(`btn-${f}`);
      if (btn) {
        btn.classList.remove('bg-white/20', 'text-white');
        btn.classList.add('bg-white', 'text-violet-700');
      }
      renderLista();
    }

    function renderLista() {
      const mes     = document.getElementById('sel-mes').value;
      const hoje    = Utils.hoje();
      const lista   = document.getElementById('lista-faturas');
      const vazio   = document.getElementById('vazio');
      const resumo  = document.getElementById('resumo');
      lista.innerHTML = '';

      let faturas = todasFaturas;
      if (mes) faturas = faturas.filter(f => f.mes === mes);

      // Calcular status real (pendente + vencida se passou do vencimento)
      faturas = faturas.map(f => ({
        ...f,
        _statusReal: (f.status === 'pendente' && String(f.vencimento) < hoje) ? 'vencida' : f.status
      }));

      // Aplicar filtro
      let filtradas = faturas;
      if (filtroAtivo === 'vencida')  filtradas = faturas.filter(f => f._statusReal === 'vencida');
      if (filtroAtivo === 'pendente') filtradas = faturas.filter(f => f._statusReal === 'pendente');
      if (filtroAtivo === 'pago')     filtradas = faturas.filter(f => f.status === 'pago');

      // Resumo
      const totalVencido  = faturas.filter(f => f._statusReal === 'vencida').reduce((s,f) => s + parseFloat(f.valor||0), 0);
      const totalPendente = faturas.filter(f => f._statusReal === 'pendente').reduce((s,f) => s + parseFloat(f.valor||0), 0);
      const totalPago     = faturas.filter(f => f.status === 'pago').reduce((s,f) => s + parseFloat(f.valor||0), 0);

      resumo.innerHTML = `
        <div class="bg-red-50 rounded-xl px-3 py-2 text-center min-w-fit">
          <p class="text-xs text-red-500 font-medium">Vencidas</p>
          <p class="font-bold text-red-600 text-sm">${Utils.formatarValor(totalVencido)}</p>
        </div>
        <div class="bg-yellow-50 rounded-xl px-3 py-2 text-center min-w-fit">
          <p class="text-xs text-yellow-600 font-medium">Pendentes</p>
          <p class="font-bold text-yellow-700 text-sm">${Utils.formatarValor(totalPendente)}</p>
        </div>
        <div class="bg-green-50 rounded-xl px-3 py-2 text-center min-w-fit">
          <p class="text-xs text-green-600 font-medium">Pagas</p>
          <p class="font-bold text-green-700 text-sm">${Utils.formatarValor(totalPago)}</p>
        </div>
      `;
      resumo.classList.remove('hidden');

      if (filtradas.length === 0) {
        vazio.classList.remove('hidden');
        return;
      }
      vazio.classList.add('hidden');

      const alunosMap = {};
      todosAlunos.forEach(a => { alunosMap[a.id] = a; });

      filtradas.forEach(f => {
        const aluno = alunosMap[f.aluno_id];
        if (!aluno) return;
        const s = Utils.statusLabel(f._statusReal === 'vencida' ? 'vencida' : f.status);
        const fone = aluno.resp_telefone || aluno.telefone;
        const nomeContato = aluno.resp_nome ? `${aluno.resp_nome} (resp.)` : aluno.nome;
        const msgWpp = `Olá ${(aluno.resp_nome || aluno.nome).split(' ')[0]}! Lembrando que a mensalidade de *${aluno.nome.split(' ')[0]}* referente a *${Utils.formatarMes(f.mes)}* no valor de *${Utils.formatarValor(f.valor)}* vence em ${Utils.formatarData(f.vencimento)}. Obrigada!`;

        const card = document.createElement('div');
        card.className = 'bg-white rounded-2xl px-4 py-3 shadow-sm';
        card.innerHTML = `
          <div class="flex items-start justify-between">
            <div class="min-w-0 pr-2">
              <p class="font-semibold text-gray-800 truncate">${aluno.nome}</p>
              <p class="text-xs text-gray-500">
                ${Utils.formatarMes(f.mes)} · Venc. ${Utils.formatarData(f.vencimento)}
              </p>
            </div>
            <div class="text-right flex-shrink-0">
              <p class="font-bold text-gray-800">${Utils.formatarValor(f.valor)}</p>
              <span class="text-xs px-2 py-0.5 rounded-full ${s.cls}">${s.text}</span>
            </div>
          </div>
          <div class="flex gap-2 mt-3">
            ${f.status !== 'pago' ? `
            <button onclick="marcarPago('${f.id}')"
              class="flex-1 py-2 bg-green-100 text-green-700 rounded-xl text-xs font-medium hover:bg-green-200">
              ✅ Marcar pago
            </button>` : ''}
            ${fone ? `
            <a href="${Utils.whatsapp(fone, msgWpp)}" target="_blank"
              class="flex-1 py-2 bg-green-50 text-green-700 rounded-xl text-xs font-medium text-center hover:bg-green-100">
              💬 WhatsApp
            </a>` : ''}
          </div>
        `;
        lista.appendChild(card);
      });
    }

    async function marcarPago(faturaId) {
      try {
        await API.updateFatura(faturaId, { status: 'pago' });
        Utils.mostrarSucesso('Fatura marcada como paga!');
        const idx = todasFaturas.findIndex(f => String(f.id) === String(faturaId));
        if (idx !== -1) todasFaturas[idx].status = 'pago';
        renderLista();
      } catch (err) {
        Utils.mostrarErro(err.message);
      }
    }

    async function gerarFaturas() {
      const mes = document.getElementById('sel-mes').value;
      if (!mes) return Utils.mostrarErro('Selecione um mês');
      if (!confirm(`Gerar faturas para ${Utils.formatarMes(mes)}?`)) return;
      try {
        const r = await API.gerarFaturas(mes);
        Utils.mostrarSucesso(`${r.criadas} fatura(s) gerada(s)!`);
        todasFaturas = await API.getFaturas();
        renderLista();
      } catch (err) {
        Utils.mostrarErro(err.message);
      }
    }

    init();
  </script>
</body>
</html>
